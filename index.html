<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asadero La Esmeralda - Pro Dashboard</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root{--bg:#0f172a;--card:#1e293b;--accent:#f59e0b;--accent2:#ef4444;--text:#ffffff;--soft:#334155;}
        body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--card); padding: 30px; border-radius: 24px;
            width: 85%; max-width: 350px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header{background:linear-gradient(135deg,var(--accent),var(--accent2));padding:20px;text-align:center;font-weight:900;color:white;position:sticky;top:0;z-index:100;box-shadow:0 4px 10px rgba(0,0,0,0.3);letter-spacing:1px;}
        .config-icon{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:24px;cursor:pointer;background:rgba(0,0,0,0.2);padding:8px;border-radius:50%;line-height:1;}
        .fs-icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:20px;cursor:pointer;background:rgba(0,0,0,0.2);padding:8px;border-radius:50%;line-height:1;}

        .main-wrapper{max-width:1200px;margin:auto;padding:20px;display:grid;grid-template-columns:1fr;gap:20px; padding-bottom: 120px;}

        @media (min-width: 768px) {
            .main-wrapper { grid-template-columns: 350px 1fr; align-items: start; }
            .sidebar { position: sticky; top: 90px; }
        }

        .card{background:var(--card);padding:20px;border-radius:24px;margin-bottom:15px;box-shadow:0 10px 25px rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.05);}
        .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(60px, 1fr));gap:10px;}
        .btn{padding:14px;border:none;border-radius:14px;background:var(--soft);color:white;cursor:pointer;font-weight:bold;transition:0.2s;}
        .btn.active{background:var(--accent);color:#000;box-shadow:0 0 15px rgba(245,158,11,0.4);}

        .hidden { display: none !important; }
        .input-field { width:100%; padding:15px; border-radius:12px; border:1px solid var(--soft); background:#020617; color:white; font-size:16px; margin-bottom:10px; box-sizing:border-box; font-family: inherit;}

        .cat-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .btn-cat { padding: 10px 16px; border: 1px solid var(--soft); border-radius: 20px; background: #020617; color: white; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-cat.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .chips-container{display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:12px;margin-top:15px;}
        .chip{
            display:flex; align-items:center; gap:12px; padding:12px; background:#020617;
            border:1px solid var(--soft); border-radius:18px; cursor:pointer; transition:0.2s;
        }
        .chip:active{transform:scale(0.95);}
        .chip img { width:65px; height:65px; border-radius:12px; object-fit:cover; }
        .chip-info b { display:block; font-size:15px; color:#ffffff; }
        .chip-info span { color:var(--accent); font-weight:bold; }

        .item-pedido {
            display:flex; justify-content:space-between; align-items:center;
            background:rgba(0,0,0,0.4); padding:12px; border-radius:14px; margin-bottom:10px; gap:10px;
        }

        .compact-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--accent);
            z-index: 1000;
            padding: 10px 15px;
            display: flex; flex-direction: column; gap: 8px;
        }

        .footer-top { display: flex; justify-content: space-between; align-items: center; }
        .footer-info-group { line-height: 1.1; }
        .footer-label { font-size: 11px; color: var(--accent); font-weight: 800; text-transform: uppercase; display: block; }
        .footer-total { font-size: 1.6rem; font-weight: 900; color: #fff; margin: 0; }
        .footer-badge { background: var(--accent2); padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }

        .footer-actions { display: flex; gap: 8px; }
        .footer-actions button { 
            flex: 1; height: 42px; border-radius: 12px; border: none; 
            font-weight: bold; color: white; cursor: pointer; font-size: 14px; 
        }

        label{display:block; margin-bottom:8px; font-size:13px; color:var(--accent); text-transform:uppercase; font-weight:800; letter-spacing:1px;}
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color:var(--accent); margin-top:0;">🔥 ACCESO</h2>
        <input type="text" id="user" class="input-field" placeholder="Usuario">
        <input type="password" id="pass" class="input-field" placeholder="Contraseña">
        <label style="display:flex; align-items:center; justify-content:center; gap:8px; color:white; text-transform: none;">
            <input type="checkbox" id="remember"> Recordar mis datos
        </label>
        <button class="btn" style="width:100%; background:var(--accent); color:black; margin-top:15px;" onclick="validarAcceso()">ENTRAR</button>
        <p id="login-error" style="color:var(--accent2); font-size:13px; margin-top:15px; display:none; font-weight:bold;">❌ Datos incorrectos</p>
    </div>
</div>

<header>
    <span class="fs-icon" onclick="toggleFullScreen()">⛶</span>
    🔥 ASADERO LA ESMERALDA GOURMET
    <span class="config-icon" onclick="toggleConfig()">⚙️</span>
</header>

<div class="main-wrapper">
    <div class="sidebar">
        <div id="panelConfig" class="card hidden">
            <label>⚙️ Panel de Control</label>
            <input type="tel" id="configWa" class="input-field" placeholder="WhatsApp Destino" onchange="saveConfig()">
            <input type="number" id="configPrecioDomi" class="input-field" placeholder="Precio Domicilio" onchange="saveConfig(); calcularTotal();">
            
            <button class="btn" style="background:#22c55e; color:white; width:100%; margin-bottom:10px;" onclick="exportarVentasExcel()">📊 DESCARGAR EXCEL</button>
            <button class="btn" style="background:var(--accent2); color:white; width:100%; margin-bottom:10px;" onclick="borrarBaseDatos()">🗑️ LIMPIAR TODO</button>
            
            <label>Número de Mesas</label>
            <div class="grid" style="grid-template-columns: 1fr 2fr 1fr;">
                <button class="btn" onclick="ajustarMesas(-1)">➖</button>
                <span id="displayNumMesas" style="font-size:1.5rem; font-weight:bold; text-align:center;">8</span>
                <button class="btn" onclick="ajustarMesas(1)">➕</button>
            </div>
            <button class="btn" style="background:var(--accent); color:#000; margin-top:15px; width:100%;" onclick="toggleConfig()">CERRAR PANEL</button>
        </div>

        <div class="card">
            <label>🛵 Servicio</label>
            <div class="grid" style="grid-template-columns: 1fr 1fr;">
                <button class="btn active" id="btnLocal" onclick="setServicio('local')">LOCAL</button>
                <button class="btn" id="btnDomi" onclick="setServicio('domicilio')">DOMICILIO</button>
            </div>
            <div id="formDomicilio" class="domi-form hidden" style="margin-top:15px;">
                <input type="text" id="domiNombre" class="input-field" placeholder="Cliente">
                <input type="tel" id="domiTel" class="input-field" placeholder="Teléfono">
                <input type="text" id="domiDir" class="input-field" placeholder="Dirección">
                <textarea id="domiObs" class="input-field" placeholder="Observaciones..."></textarea>
            </div>
            <div id="sectionMesas" style="margin-top:15px;">
                <label>📍 Mesa</label>
                <div class="grid" id="mesas"></div>
                <textarea id="localObs" class="input-field" placeholder="Notas de la mesa..." style="margin-top:10px;"></textarea>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <label>👤 Cantidad de Pedidos</label>
            <div class="grid" style="grid-template-columns: 1fr 2fr 1fr; max-width: 300px;">
                <button class="btn" onclick="cambiarComensales(-1)">➖</button>
                <span id="cantComensales" style="font-size:1.6rem; font-weight:bold; text-align: center;">1</span>
                <button class="btn" onclick="cambiarComensales(1)">➕</button>
            </div>
        </div>
        <div id="contenedor-pedidos"></div>
    </div>
</div>

<div class="compact-footer">
    <div class="footer-top">
        <div class="footer-info-group">
            <span class="footer-label" id="label-mesa-domi">Mesa: N/A</span>
            <span class="footer-total" id="total-val-fixed">$0</span>
        </div>
        <span class="footer-badge" id="badge-items">0 Platos</span>
    </div>
    <div class="footer-actions">
        <button style="background:var(--accent2); flex:0.4;" onclick="nuevoPedido()">NUEVO</button>
        <button style="background:#06b6d4;" onclick="imprimir()">TICKET</button>
        <button style="background:#22c55e;" onclick="wa()">WHATSAPP</button>
    </div>
</div>

<iframe id="printFrame" style="display:none;"></iframe>

<script>
// --- CONFIGURACIÓN DE BASE DE DATOS LOCAL (DEXIE) ---
const db = new Dexie("EsmeraldaDB");
db.version(1).stores({ ventas: '++id, fecha, atendido, servicio, total, mesa' });

// --- VARIABLES ---
const URL_USUARIOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQcPjmET3KGocH1nu-BSY_rbDB5FTrIpRNL5h_jFaCQq5h3sOoQnkb3aixwq5WQL-fQ8FLe3tdtAiZN/pub?output=csv"; 
const URL_MENU = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTU3FT66_0vVAygWPIDfjIAhGwnKGWeBhDB3cVrzkMZQRP6M0ONz2_xwy-u8Q7muAoP6oa4QFxXc7xb/pub?output=csv";
const IMG_DEFAULT = "https://via.placeholder.com/150?text=COMIDA";

let db_usuarios = [], menu = [], numComensales = 1, pedidosPorPersona = {}, tipoServicio = 'local', usuarioActivo = "";

// --- LOGIN Y CARGA ---
window.onload = () => {
    const savedUser = localStorage.getItem("tamarindo_user");
    const savedPass = localStorage.getItem("tamarindo_pass");
    if(savedUser) {
        document.getElementById("user").value = savedUser;
        document.getElementById("pass").value = savedPass;
        document.getElementById("remember").checked = true;
    }
};

fetch(URL_USUARIOS).then(r => r.text()).then(t => {
    db_usuarios = parseCSV(t).slice(1).map(f => ({ user: f[0]?.trim(), pass: f[1]?.trim() }));
});

function validarAcceso() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    if (db_usuarios.find(acc => acc.user === u && acc.pass === p)) {
        if(document.getElementById("remember").checked){
            localStorage.setItem("tamarindo_user", u); localStorage.setItem("tamarindo_pass", p);
        }
        usuarioActivo = u; document.getElementById('login-overlay').style.display = 'none'; 
        iniciarApp();
    } else { document.getElementById('login-error').style.display = 'block'; }
}

function iniciarApp() {
    fetch(URL_MENU).then(r=>r.text()).then(t=>{
        menu = parseCSV(t).slice(1).map(f=>({ cat: f[0], nombre: f[1], precio: parseInt(f[3]?.replace(/[^0-9]/g, '')) || 0, img: f[4]?.trim() })).filter(m => m.nombre);
        init();
    });
}

function init(){
    document.getElementById("displayNumMesas").textContent = localStorage.getItem("tamarindo_mesas") || 8;
    document.getElementById("configWa").value = localStorage.getItem("tamarindo_wa") || "";
    document.getElementById("configPrecioDomi").value = localStorage.getItem("tamarindo_precio_domi") || 0;
    crearMesas(); renderComensales();
}

// --- FUNCIONES CORE ---
function parseCSV(t) {
    const r=[], row=[]; let c='', q=false;
    for(let ch of t){
        if(ch=='"') q=!q;
        else if(ch==','&&!q){row.push(c);c=''}
        else if(ch=='\n'&&!q){row.push(c);r.push([...row]);row.length=0;c=''}
        else c+=ch;
    }
    row.push(c); r.push(row); return r;
}

function registrarVentaDB(total) {
    const mesaActiva = document.querySelector("#mesas .active")?.textContent || "N/A";
    const listaProductos = [];
    Object.values(pedidosPorPersona).forEach(arr => arr.forEach(p => listaProductos.push(p.nombre)));

    db.ventas.add({
        fecha: new Date().toLocaleString(),
        atendido: usuarioActivo.toUpperCase(),
        servicio: tipoServicio,
        mesa: tipoServicio === 'domicilio' ? 'DOMI' : mesaActiva,
        productos: listaProductos.join(" | "),
        total: total
    });
}

async function exportarVentasExcel() {
    const ventas = await db.ventas.toArray();
    if(ventas.length === 0) return alert("No hay ventas registradas.");
    
    let csv = "\uFEFFID,FECHA,ATENDIDO,SERVICIO,MESA,PRODUCTOS,TOTAL\n";
    ventas.forEach(v => {
        csv += `${v.id},${v.fecha},${v.atendido},${v.servicio},${v.mesa},"${v.productos}",${v.total}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Reporte_Esmeralda_${new Date().toLocaleDateString()}.csv`;
    link.click();
}

function borrarBaseDatos() {
    if(confirm("¿Seguro que quieres borrar TODO el historial de ventas?")) {
        db.ventas.clear();
        alert("Historial borrado.");
    }
}

// --- INTERFAZ ---
function toggleConfig() { document.getElementById('panelConfig').classList.toggle('hidden'); }
function saveConfig() { 
    localStorage.setItem("tamarindo_wa", document.getElementById("configWa").value); 
    localStorage.setItem("tamarindo_precio_domi", document.getElementById("configPrecioDomi").value);
}

function setServicio(tipo) {
    tipoServicio = tipo;
    document.getElementById('btnLocal').classList.toggle('active', tipo === 'local');
    document.getElementById('btnDomi').classList.toggle('active', tipo === 'domicilio');
    document.getElementById('formDomicilio').classList.toggle('hidden', tipo === 'local');
    document.getElementById('sectionMesas').classList.toggle('hidden', tipo === 'domicilio');
    calcularTotal();
}

function crearMesas(){
    const cont = document.getElementById("mesas"), n = parseInt(document.getElementById("displayNumMesas").textContent);
    cont.innerHTML = "";
    for(let i=1; i<=n; i++){
        let b=document.createElement("button"); b.className="btn"; b.textContent=i;
        b.onclick=()=>{
            document.querySelectorAll("#mesas .btn").forEach(x=>x.classList.remove("active"));
            b.classList.add("active"); calcularTotal();
        };
        cont.appendChild(b);
    }
}

function ajustarMesas(cambio) {
    let nuevo = Math.max(1, parseInt(document.getElementById("displayNumMesas").textContent) + cambio);
    document.getElementById("displayNumMesas").textContent = nuevo;
    localStorage.setItem("tamarindo_mesas", nuevo); crearMesas();
}

function cambiarComensales(n){
    numComensales = Math.max(1, numComensales + n);
    document.getElementById("cantComensales").textContent = numComensales;
    renderComensales();
}

function renderComensales(){
    const cont = document.getElementById("contenedor-pedidos"), cats = [...new Set(menu.map(m=>m.cat))].filter(Boolean);
    cont.innerHTML = "";
    for(let i=1; i<=numComensales; i++){
        let card = document.createElement("div"); card.className = "card";
        card.innerHTML = `<label>👤 Pedido ${i}</label><div id="cats-${i}" class="cat-container">${cats.map((c, idx)=>`<button class="btn-cat ${idx===0?'active':''}" onclick="setCat(${i}, '${c}', this)">${c}</button>`).join("")}</div><div id="chips-${i}" class="chips-container"></div><div id="resumen-${i}" style="margin-top:15px; border-top:1px dashed var(--soft); padding-top:10px;"></div>`;
        cont.appendChild(card); renderChips(i, cats[0]);
        if(pedidosPorPersona[i]) actualizarResumenPersona(i);
    }
    calcularTotal();
}

function setCat(idx, cat, btn) {
    const parent = document.getElementById(`cats-${idx}`);
    parent.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); renderChips(idx, cat);
}

function renderChips(idx, cat){
    document.getElementById(`chips-${idx}`).innerHTML = menu.filter(m => m.cat === cat).map(p => {
        const foto = p.img || IMG_DEFAULT;
        return `<div class="chip" onclick="agregarPlato(${idx}, '${p.nombre}')">
                    <img src="${foto}">
                    <div class="chip-info"><b>${p.nombre}</b><span>$${p.precio.toLocaleString()}</span></div>
                </div>`;
    }).join("");
}

function agregarPlato(idx, n){
    if(!pedidosPorPersona[idx]) pedidosPorPersona[idx] = [];
    pedidosPorPersona[idx].unshift(menu.find(m=>m.nombre === n));
    actualizarResumenPersona(idx); calcularTotal();
}

function actualizarResumenPersona(idx){
    const cont = document.getElementById(`resumen-${idx}`), items = pedidosPorPersona[idx] || [];
    const agrupado = items.reduce((acc, curr) => { 
        if (!acc[curr.nombre]) acc[curr.nombre] = { ...curr, cant: 0 }; 
        acc[curr.nombre].cant += 1; return acc; 
    }, {});
    cont.innerHTML = Object.values(agrupado).map((p) => `
        <div class="item-pedido">
            <div style="flex:1;"><b>${p.nombre}</b><br><small style="color:var(--accent)">Cant: ${p.cant}</small></div>
            <b style="color:var(--accent);">$${(p.precio * p.cant).toLocaleString()}</b>
            <button class="del-btn" style="margin-left:10px;" onclick="quitarPlato(${idx},'${p.nombre}')">✕</button>
        </div>`).join("");
}

function quitarPlato(idx, nombre){
    const index = pedidosPorPersona[idx].findIndex(p => p.nombre === nombre);
    if(index !== -1) pedidosPorPersona[idx].splice(index, 1);
    actualizarResumenPersona(idx); calcularTotal();
}

function calcularTotal(){
    let t = 0, count = 0;
    Object.values(pedidosPorPersona).forEach(pArr => {
        t += pArr.reduce((sum, p) => sum + p.precio, 0); count += pArr.length;
    });
    if(tipoServicio === 'domicilio') t += parseInt(document.getElementById("configPrecioDomi").value) || 0;
    document.getElementById("total-val-fixed").textContent = `$${t.toLocaleString()}`;
    document.getElementById("badge-items").textContent = `${count} Platos`;
    const mesa = document.querySelector("#mesas .active")?.textContent || "N/A";
    document.getElementById("label-mesa-domi").textContent = tipoServicio === 'domicilio' ? "🛵 DOMICILIO" : `📍 MESA: ${mesa}`;
    return t;
}

function nuevoPedido(){
    if(!confirm("¿Borrar pedido actual?")) return;
    numComensales = 1; pedidosPorPersona = {};
    document.getElementById("cantComensales").textContent = 1;
    document.querySelectorAll("input, textarea").forEach(i => { if(!i.id.startsWith("config")) i.value = ""; });
    document.querySelectorAll("#mesas .btn").forEach(x => x.classList.remove("active"));
    setServicio('local'); renderComensales();
}

function toggleFullScreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

// --- SALIDA ---
function wa(){
    const mesa = document.querySelector("#mesas .active")?.textContent || "N/A", total = calcularTotal(), targetNum = document.getElementById("configWa").value;
    if(total === 0) return alert("Pedido vacío");
    registrarVentaDB(total); // Guarda en SQL local
    let msg = `🔥 *ASADERO TAMARINDO*\n--------------------------\n👤 *Atendido:* ${usuarioActivo.toUpperCase()}\n`;
    if(tipoServicio === 'domicilio'){
        msg += `🛵 *DOMICILIO*\n👤 *Cli:* ${document.getElementById('domiNombre').value}\n📍 *Dir:* ${document.getElementById('domiDir').value}\n`;
    } else { msg += `📍 *Mesa:* ${mesa}\n`; }
    msg += `--------------------------\n`;
    Object.keys(pedidosPorPersona).forEach(idx => {
        if(pedidosPorPersona[idx].length > 0){
            msg += `👤 *Pedido ${idx}:*\n`;
            const agrupado = pedidosPorPersona[idx].reduce((acc, curr) => { acc[curr.nombre] = (acc[curr.nombre] || 0) + 1; return acc; }, {});
            for (const [nombre, cant] of Object.entries(agrupado)) { msg += ` - ${cant}x ${nombre}\n`; }
        }
    });
    msg += `--------------------------\n💰 *TOTAL: $${total.toLocaleString()}*`;
    window.open(`https://wa.me/${targetNum}?text=${encodeURIComponent(msg)}`);
}

function imprimir() {
    const mesa = document.querySelector("#mesas .active")?.textContent || "N/A";
    const totalVal = calcularTotal();
    const configPrecioDomi = parseInt(document.getElementById("configPrecioDomi").value) || 0;
    if (totalVal === 0) return alert("No hay productos");

    registrarVentaDB(totalVal); // Guarda en SQL local

    const fecha = new Date().toLocaleString('es-CO', { hour12: true });
    const esDomi = tipoServicio === 'domicilio';
    
    let detalleProductos = "";
    Object.keys(pedidosPorPersona).forEach(idx => {
        if (pedidosPorPersona[idx].length > 0) {
            const agrupado = pedidosPorPersona[idx].reduce((acc, curr) => { 
                acc[curr.nombre] = (acc[curr.nombre] || 0) + 1; 
                acc[curr.nombre + "_precio"] = curr.precio; return acc; 
            }, {});
            detalleProductos += `<div style="border-bottom:1px dashed #ccc; padding: 5px 0;"><strong>PEDIDO ${idx}</strong><br>`;
            for (const [nombre, cant] of Object.entries(agrupado)) {
                if (!nombre.endsWith("_precio")) {
                    const subtotal = cant * agrupado[nombre + "_precio"];
                    detalleProductos += `${cant}x ${nombre.substring(0,18)} <span style="float:right">$${subtotal.toLocaleString()}</span><br>`;
                }
            }
            detalleProductos += `</div>`;
        }
    });

    const infoCliente = esDomi ? `
        <div style="border:1px solid #000; padding:5px; margin:5px 0;">
            <b>DOMICILIO</b><br>
            Cli: ${document.getElementById('domiNombre').value || 'N/A'}<br>
            Tel: ${document.getElementById('domiTel').value || 'N/A'}<br>
            Dir: ${document.getElementById('domiDir').value || 'N/A'}
        </div>` : `<p><b>UBICACIÓN: MESA ${mesa}</b></p>`;
